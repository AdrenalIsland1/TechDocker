name: TechDocker Documentation Automation Demo

on:
  push:
    branches:
      - main
    # Loop guard 1: pushes that only touch generated artifacts (i.e. the
    # commit this workflow itself makes) do not retrigger it.
    paths-ignore:
      - artifacts/**
  workflow_dispatch:

# Needed so the workflow can push the updated summary artifacts back.
permissions:
  contents: write

jobs:
  summary-automation:
    runs-on: ubuntu-latest
    # Loop guard 2: never run for commits made by the workflow's own bot user.
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Full history so git diff can compare the before/after commits.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

      - name: Log push and project context
        env:
          # github.event.before only exists for push events; on manual
          # workflow_dispatch this is empty and the scripts handle it.
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: python3 -m src.automation_demo

      - name: Update project summary
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: python3 -m src.summary_updater

      - name: Commit updated summary artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            artifacts/summaries/base_original_summary.md \
            artifacts/summaries/base_updated_summary.md \
            artifacts/skeletons/base_skeleton.json \
            artifacts/change_packages/latest_change_summary.json
          if git diff --cached --quiet; then
            echo "No summary artifact changes to commit."
          else
            git commit -m "Update project summary from automation [skip ci]"
            git push
          fi
