name: TechDocker Documentation Automation Demo

on:
  push:
    branches:
      - main
    # Loop guard 1: pushes that only touch generated artifacts (e.g. the
    # merge commit of an accepted summary PR) do not retrigger the workflow.
    paths-ignore:
      - artifacts/**
  workflow_dispatch:

# The workflow pushes a proposal branch and opens a PR — it never commits
# directly to main.
permissions:
  contents: write
  pull-requests: write

jobs:
  summary-automation:
    runs-on: ubuntu-latest
    # Loop guard 2: never run for commits made by the workflow's own bot user.
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Full history so git diff can compare the before/after commits.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

      - name: Log push and project context
        env:
          # github.event.before only exists for push events; on manual
          # workflow_dispatch this is empty and the scripts handle it.
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: python3 -m src.automation_demo

      - name: Update project summary
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: python3 -m src.summary_updater

      - name: Detect summary artifact changes
        id: detect
        run: |
          if git status --porcelain -- \
            artifacts/summaries/base_original_summary.md \
            artifacts/summaries/base_updated_summary.md \
            artifacts/skeletons/base_skeleton.json \
            artifacts/change_packages/latest_change_summary.json \
            | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No summary changes to propose"
          fi

      - name: Propose summary update via Pull Request
        if: steps.detect.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="techdocker/summary-update-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add \
            artifacts/summaries/base_original_summary.md \
            artifacts/summaries/base_updated_summary.md \
            artifacts/skeletons/base_skeleton.json \
            artifacts/change_packages/latest_change_summary.json
          git commit -m "Propose project summary update"
          git push origin "$BRANCH"
          python3 -m src.pr_summary_report > pr_body.md
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Suggested project summary update" \
            --body-file pr_body.md
